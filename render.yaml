services:
  - type: web
    name: library-lite-api
    runtime: node
    plan: free
    buildCommand: "cd backend && npm install && ./node_modules/.bin/prisma generate && ./node_modules/.bin/prisma migrate deploy"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
