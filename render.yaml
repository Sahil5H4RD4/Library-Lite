services:
  - type: web
      name: library-lite-api
          runtime: node
              plan: free
                  rootDir: backend
                      buildCommand: "npm install && npx prisma generate && npx prisma migrate deploy"
                          startCommand: "npm start"
                              envVars:
                                    - key: NODE_ENV
                                            value: production
                                                  - key: PORT
                                                          value: 10000
                                                                - key: DATABASE_URL
                                                                        sync: false
                                                                              - key: JWT_SECRET
                                                                                      sync: false
                                                                                            - key: FRONTEND_URL
                                                                                                    sync: false
                                                                                                    
